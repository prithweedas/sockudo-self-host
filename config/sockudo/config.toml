host = "0.0.0.0"
port = 6001
debug = false

[app_manager]
driver = "mysql"

[adapter]
driver = "redis"

[cache]
driver = "redis"

[queue]
driver = "redis"

[webhooks]
enabled = true
batching_enabled = true
max_batch_size = 50
flush_interval_ms = 500
timeout_ms = 5000

[rate_limiter]
enabled = true
driver = "redis"

[rate_limiter.api_rate_limit]
max_requests = 3000
window_seconds = 60

[rate_limiter.websocket_rate_limit]
max_requests = 1000
window_seconds = 60

[metrics]
enabled = true
host = "0.0.0.0"
port = 9601
