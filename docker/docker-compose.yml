name: sockudo-docker

services:
  traefik:
    image: traefik:v3
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.sockudo.address=:6001
      - --entrypoints.dashboard.address=:5174
      - --entrypoints.dashboard-api.address=:3460
    ports:
      - "${SOCKUDO_PORT:?SOCKUDO_PORT is required}:6001"
      - "${DASHBOARD_WEB_PORT:?DASHBOARD_WEB_PORT is required}:5174"
      - "${DASHBOARD_API_PORT:?DASHBOARD_API_PORT is required}:3460"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  sockudo:
    image: ghcr.io/sockudo/sockudo:${SOCKUDO_VERSION:?SOCKUDO_VERSION is required}
    command: sockudo --config /app/config/config.toml
    env_file:
      - path: ../config/sockudo/.env
        required: false
    expose:
      - "6001"
      - "${SOCKUDO_METRICS_PORT:?SOCKUDO_METRICS_PORT is required}"
    environment:
      HOST: 0.0.0.0
      PORT: 6001
      METRICS_ENABLED: "true"
      METRICS_HOST: 0.0.0.0
      METRICS_PORT: ${SOCKUDO_METRICS_PORT:?SOCKUDO_METRICS_PORT is required}
      REDIS_URL: ${REDIS_URL:?REDIS_URL is required}
      APP_MANAGER_DRIVER: pgsql
      DATABASE_POSTGRES_HOST: postgres
      DATABASE_POSTGRES_PORT: 5432
      DATABASE_POSTGRES_USERNAME: ${POSTGRES_USER:?POSTGRES_USER is required}
      DATABASE_POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      DATABASE_POSTGRES_DATABASE: ${POSTGRES_DB:?POSTGRES_DB is required}
      DATABASE_POSTGRES_POOL_MIN: ${DATABASE_POSTGRES_POOL_MIN:?DATABASE_POSTGRES_POOL_MIN is required}
      DATABASE_POSTGRES_POOL_MAX: ${DATABASE_POSTGRES_POOL_MAX:?DATABASE_POSTGRES_POOL_MAX is required}
      HTTP_API_USAGE_ENABLED: "true"
      SOCKUDO_SKIP_INLINE_APPS: "true"
    volumes:
      - ../config/sockudo/config.toml:/app/config/config.toml:ro
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${SOCKUDO_METRICS_PORT:?SOCKUDO_METRICS_PORT is required}/metrics"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    labels:
      - traefik.enable=true
      - traefik.http.routers.sockudo.rule=Host(`localhost`) || Host(`127.0.0.1`)
      - traefik.http.routers.sockudo.entrypoints=sockudo
      - traefik.http.services.sockudo.loadbalancer.server.port=6001
    restart: unless-stopped

  dashboard-api:
    image: sockudo-dashboard-api:4.6.0
    env_file:
      - path: ../config/dashboard-api/.env
        required: false
    expose:
      - "${DASHBOARD_API_PORT:?DASHBOARD_API_PORT is required}"
    environment:
      NODE_ENV: production
      DASHBOARD_API_PORT: ${DASHBOARD_API_PORT:?DASHBOARD_API_PORT is required}
      DASHBOARD_CORS_ORIGIN: ${DASHBOARD_CORS_ORIGIN:?DASHBOARD_CORS_ORIGIN is required}
      DASHBOARD_SESSION_SECRET: ${DASHBOARD_SESSION_SECRET:?DASHBOARD_SESSION_SECRET is required}
      DASHBOARD_SEED_EMAIL: ${DASHBOARD_SEED_EMAIL:?DASHBOARD_SEED_EMAIL is required}
      DASHBOARD_SEED_PASSWORD: ${DASHBOARD_SEED_PASSWORD:?DASHBOARD_SEED_PASSWORD is required}
      DASHBOARD_SEED_NAME: ${DASHBOARD_SEED_NAME:?DASHBOARD_SEED_NAME is required}
      APP_MANAGER_DRIVER: pgsql
      DASHBOARD_DATABASE_DRIVER: ${DASHBOARD_DATABASE_DRIVER:?DASHBOARD_DATABASE_DRIVER is required}
      DATABASE_POSTGRES_HOST: ${DASHBOARD_DATABASE_POSTGRES_HOST:?DASHBOARD_DATABASE_POSTGRES_HOST is required}
      DATABASE_POSTGRES_PORT: ${DASHBOARD_DATABASE_POSTGRES_PORT:?DASHBOARD_DATABASE_POSTGRES_PORT is required}
      DATABASE_POSTGRES_USERNAME: ${DASHBOARD_DATABASE_POSTGRES_USERNAME:?DASHBOARD_DATABASE_POSTGRES_USERNAME is required}
      DATABASE_POSTGRES_PASSWORD: ${DASHBOARD_DATABASE_POSTGRES_PASSWORD:?DASHBOARD_DATABASE_POSTGRES_PASSWORD is required}
      DATABASE_POSTGRES_DATABASE: ${DASHBOARD_DATABASE_POSTGRES_DATABASE:?DASHBOARD_DATABASE_POSTGRES_DATABASE is required}
      SOCKUDO_HTTP_URL: http://sockudo:6001
      SOCKUDO_METRICS_URL: http://sockudo:${SOCKUDO_METRICS_PORT:?SOCKUDO_METRICS_PORT is required}
    volumes:
      - dashboard-api-data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      sockudo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${DASHBOARD_API_PORT:?DASHBOARD_API_PORT is required}/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 45s
    labels:
      - traefik.enable=true
      - traefik.http.routers.dashboard-api.rule=Host(`localhost`) || Host(`127.0.0.1`)
      - traefik.http.routers.dashboard-api.entrypoints=dashboard-api
      - traefik.http.services.dashboard-api.loadbalancer.server.port=${DASHBOARD_API_PORT:?DASHBOARD_API_PORT is required}
    restart: unless-stopped

  dashboard-web:
    image: sockudo-dashboard-web:4.6.0
    env_file:
      - path: ../config/dashboard-web/.env
        required: false
    expose:
      - "80"
    environment:
      DASHBOARD_API_UPSTREAM: ${DASHBOARD_API_UPSTREAM:?DASHBOARD_API_UPSTREAM is required}
    depends_on:
      dashboard-api:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.http.routers.dashboard.rule=Host(`localhost`) || Host(`127.0.0.1`)
      - traefik.http.routers.dashboard.entrypoints=dashboard
      - traefik.http.services.dashboard.loadbalancer.server.port=80
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.55.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    volumes:
      - ../config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      sockudo:
        condition: service_healthy
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.4.0
    env_file:
      - path: ../config/grafana/.env
        required: false
    ports:
      - "${GRAFANA_PORT:?GRAFANA_PORT is required}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:?GRAFANA_ADMIN_USER is required}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required}
      GF_USERS_DEFAULT_THEME: light
    volumes:
      - grafana-data:/var/lib/grafana
      - ../config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../config/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    env_file:
      - path: ../config/postgres/.env
        required: false
    ports:
      - "${POSTGRES_PORT:?POSTGRES_PORT is required}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server /usr/local/etc/redis/redis.conf --requirepass "${REDIS_PASSWORD}"
    env_file:
      - path: ../config/redis/.env
        required: false
    ports:
      - "${REDIS_PORT:?REDIS_PORT is required}:6379"
    volumes:
      - ../config/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  redis-data:
  postgres-data:
  dashboard-api-data:
  prometheus-data:
  grafana-data:
